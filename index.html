<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Emon ❤️</title>

<style>
body{
  margin:0;
  text-align:center;
  font-family:Arial;
  background:black;
  color:white;
  overflow:hidden;
}

h1{
  margin-top:80px;
  font-size:45px;
}

#cake{
  font-size:150px;
}

#flame{
  font-size:60px;
  animation:flicker 0.6s infinite;
}

@keyframes flicker{
0%{opacity:1;}
50%{opacity:0.4;}
100%{opacity:1;}
}

button{
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:20px;
  background:#ff4081;
  color:white;
  cursor:pointer;
}

.heart{
  position:absolute;
  color:#ff4d6d;
  font-size:25px;
  animation:float 6s linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

#message{
  display:none;
  font-size:28px;
  margin-top:20px;
}
</style>

</head>

<body>

<h1>Happy Birthday Emon 🎉</h1>

<div id="cake">🎂</div>
<div id="flame">🔥</div>

<br><br>

<button onclick="blow()">Blow the Candle</button>

<div id="message">
Open this at your own risk 😌 <br><br>
Happy Birthday my love ❤️ <br>
Forever and ever you have to tolerate all my demands. <br>
Love, Debopriya 💕
</div>

<audio id="music">
<source src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.mid">
</audio>

<script>

function blow(){
  document.getElementById("flame").innerHTML="💨";
  document.getElementById("music").play();
  document.getElementById("message").style.display="block";
  startHearts();
}

function startHearts(){
  setInterval(function(){
    var heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(20+Math.random()*30)+"px";
    document.body.appendChild(heart);

    setTimeout(function(){
      heart.remove();
    },6000);

  },300);
}

</script>

</body>
</html>
